function Icon({ name, size = 18, className = '', strokeWidth = 2, color = 'currentColor' }) {
  const lib = (window.lucide && window.lucide.icons) || {};
  const node = lib[name] || lib['Circle'] || [];

function DataTable({ columns, rows, searchable = true, pageSize = 8 }) {
  const [q, setQ] = useState('');
  const [sort, setSort] = useState({ key: null, dir: 1 });
  const [page, setPage] = useState(0);
  const filtered = useMemo(() => {
    let r = rows;
    if (q) r = r.filter(row => columns.some(c => String(row[c.key] ?? '').toLowerCase().includes(q.toLowerCase())));
    if (sort.key) r = [...r].sort((a, b) => {
      const x = a[sort.key], y = b[sort.key];
      if (typeof x === 'number' && typeof y === 'number') return (x - y) * sort.dir;
      return String(x).localeCompare(String(y)) * sort.dir;
    });
    return r;
  }, [rows, q, sort, columns]);
  const pages = Math.ceil(filtered.length / pageSize) || 1;
  const view = filtered.slice(page * pageSize, page * pageSize + pageSize);
  useEffect(() => { setPage(0); }, [q, rows]);
  return (
    <div>
      {searchable && (
        <div className="relative mb-3 max-w-xs">
          <Icon name="Search" size={15} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-500" />
          <input value={q} onChange={e => setQ(e.target.value)} placeholder="Cari..." className={inputCls + ' pl-9'} />
        </div>
      )}
      <div className="overflow-x-auto rounded-xl border border-edge">
        <table className="w-full text-sm">
          <thead>
            <tr className="bg-panel2 text-slate-400 text-left">
              {columns.map(c => (
                <th key={c.key} onClick={() => c.sortable !== false && setSort(s => ({ key: c.key, dir: s.key === c.key ? -s.dir : 1 }))}
                    className="px-3 py-2.5 font-semibold whitespace-nowrap cursor-pointer select-none hover:text-cyan-300">
                  <span className="inline-flex items-center gap-1">{c.label}{sort.key === c.key && <Icon name={sort.dir === 1 ? 'ChevronUp' : 'ChevronDown'} size={12} />}</span>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {view.map((row, i) => (
              <tr key={i} className="border-t border-edge/60 hover:bg-white/[.03] transition">
                {columns.map(c => <td key={c.key} className="px-3 py-2.5 whitespace-nowrap">{c.render ? c.render(row) : row[c.key]}</td>)}
              </tr>
            ))}
            {view.length === 0 && <tr><td colSpan={columns.length} className="px-3 py-8 text-center text-slate-500">Tiada rekod</td></tr>}
          </tbody>
        </table>
      </div>
      {pages > 1 && (
        <div className="flex items-center justify-between mt-3 text-xs text-slate-400">
          <span>{filtered.length} rekod</span>
          <div className="flex items-center gap-1">
            <button disabled={page === 0} onClick={() => setPage(p => p - 1)} className="px-2.5 py-1.5 rounded-lg bg-panel2 disabled:opacity-40 hover:bg-edge"><Icon name="ChevronLeft" size={14} /></button>
            <span className="px-2">{page + 1}/{pages}</span>
            <button disabled={page >= pages - 1} onClick={() => setPage(p => p + 1)} className="px-2.5 py-1.5 rounded-lg bg-panel2 disabled:opacity-40 hover:bg-edge"><Icon name="ChevronRight" size={14} /></button>
          </div>
        </div>
      )}
    </div>
  );
}

function Gauge({ value, min, max, low, high, unit, label }) {
  const pct = Math.max(0, Math.min(100, ((value - min) / (max - min)) * 100));
  const ok = value >= low && value <= high;
  const warn = !ok && (value >= low - (high - low) * 0.15 && value <= high + (high - low) * 0.15);
  const col = ok ? '#34d399' : warn ? '#fbbf24' : '#fb7185';
  return (
    <div className="rounded-xl border border-edge bg-panel2/60 p-3">
      <div className="flex items-center justify-between mb-1.5">
        <span className="text-xs text-slate-400">{label}</span>
        <span className="text-sm font-bold" style={{ color: col }}>{value}<span className="text-[10px] text-slate-500 ml-0.5">{unit}</span></span>
      </div>
      <div className="h-2 rounded-full bg-edge overflow-hidden">
        <div className="h-full rounded-full transition-all" style={{ width: pct + '%', background: col }} />
      </div>
      <div className="flex justify-between text-[10px] text-slate-500 mt-1"><span>{min}</span><span className="text-slate-400">selamat {low}–{high}</span><span>{max}</span></div>
    </div>
  );
}

function genWQ(pondId, baseTemp){
  const arr=[];
  for(let i=29;i>=0;i--){
    const wobble=Math.sin(i/3)*0.4;
    arr.push({
      date:daysAgo(i), pond:pondId, time: i%2===0?'Pagi':'Petang',
      ph:+(8.0+wobble*0.3+(Math.random()-0.5)*0.2).toFixed(2),
      do:+(5.2+wobble*0.6+(Math.random()-0.5)*0.5).toFixed(2),
      temp:+(baseTemp+wobble+(Math.random()-0.5)*0.6).toFixed(1),
      salinity:+(18+wobble*1.5+(Math.random()-0.5)).toFixed(1),
      transparency:+(35+wobble*4+(Math.random()-0.5)*5).toFixed(0),
      ammonia:+Math.max(0,(0.05+(Math.random()-0.4)*0.06)).toFixed(3),

      alkalinity:+(120+wobble*8+(Math.random()-0.5)*10).toFixed(0),
    });
  }
  return arr;
}

  return arr;
}

const AuthCtx = createContext(null);
const useAuth = () => useContext(AuthCtx);

const PERMISSIONS = {
  Admin:   { modules:'all', manageUsers:true,  edit:true },
  Manager: { modules:'all', manageUsers:false, edit:true },
  Pekerja: { modules:['dashboard','water','feed','growth','health'], manageUsers:false, edit:'daily' },
};
function canSee(role, moduleId){
  const p = PERMISSIONS[role]; if(!p) return false;
  if(p.modules==='all') return moduleId!=='users' ? true : p.manageUsers;
  if(moduleId==='users') return p.manageUsers;
  return p.modules.includes(moduleId);
}

function AuthProvider({ children }){
  const [users, setUsers] = useState(()=>{
    try{ const s=localStorage.getItem('upro_users'); return s?JSON.parse(s):SEED_USERS; }catch(e){ return SEED_USERS; }
  });
  const [user, setUser] = useState(()=>{
    try{ const s=localStorage.getItem('upro_session'); return s?JSON.parse(s):null; }catch(e){ return null; }
  });
  useEffect(()=>{ localStorage.setItem('upro_users', JSON.stringify(users)); },[users]);

  const login = (email, password, remember) => {
    const u = users.find(x=>x.email.toLowerCase()===email.toLowerCase().trim() && x.password===password);
    if(!u) return { ok:false, msg:'Email atau kata laluan salah.' };
    if(!u.active) return { ok:false, msg:'Akaun tidak aktif. Hubungi admin.' };
    const sess = { id:u.id, name:u.name, email:u.email, role:u.role };
    setUser(sess);
    if(remember) localStorage.setItem('upro_session', JSON.stringify(sess));
    else sessionStorage.setItem('upro_session', JSON.stringify(sess));
    setUsers(us=>us.map(x=>x.id===u.id?{...x,lastLogin:todayISO}:x));
    return { ok:true };
  };
  const register = (data) => {
    if(users.some(x=>x.email.toLowerCase()===data.email.toLowerCase().trim()))
      return { ok:false, msg:'Email sudah didaftarkan.' };
    const nu = { id:Date.now(), ...data, active:true, lastLogin:null };
    setUsers(us=>[...us,nu]);
    return { ok:true };
  };
  const logout = () => { setUser(null); localStorage.removeItem('upro_session'); sessionStorage.removeItem('upro_session'); };

  return <AuthCtx.Provider value={{ user, users, setUsers, login, register, logout }}>{children}</AuthCtx.Provider>;
}

    const g=growth.filter(x=>x.pond===p.id).slice(-1)[0];

function PondsModule(){

  const doc = p => p.stockDate ? Math.max(0,Math.round((new Date('2026-06-07')-new Date(p.stockDate))/864e5)) : 0;

/* ============================================================
   PERTUMBUHAN UDANG (Growth Monitoring)
   ============================================================ */
function GrowthModule(){
  const { growth:GR, setGrowth, ponds } = useData();
  const { user } = useAuth();
  const canEdit = PERMISSIONS[user.role].edit===true || PERMISSIONS[user.role].edit==='daily';
  const activePonds = ponds.filter(p=>p.status==='Aktif'||p.status==='Tuaian');
  const [pond,setPond]=useState(activePonds[0]?.id||'KOLAM C');
  const data = GR.filter(g=>g.pond===pond).sort((a,b)=>a.week-b.week);
  const pondObj = ponds.find(p=>p.id===pond);
  const latest = data[data.length-1]||{};
  const alive = pondObj?Math.round(pondObj.seeded*pondObj.survival/100):0;
  const biomass = latest.abw?((latest.abw/1000)*alive):0;
  const adg = latest.adg||0;
  const chart = data.map(g=>({week:'W'+g.week, ABW:g.abw, Sasaran:g.target}));

  const cols=[
    { key:'week',label:'Minggu',render:r=>'Minggu '+r.week },{ key:'date',label:'Tarikh' },
    { key:'abw',label:'ABW (g)',render:r=><b className="text-cyan-300">{r.abw}</b> },
    { key:'length',label:'Panjang (cm)' },
    { key:'adg',label:'ADG (g/hari)' },
    { key:'target',label:'Sasaran (g)' },
    { key:'_v',label:'vs Sasaran',sortable:false,render:r=>{const d=r.abw-r.target;return <span className={d>=0?'text-emerald-300':'text-amber-300'}>{d>=0?'+':''}{d.toFixed(2)}g</span>;} },
  ];
  // size grade distribution (count/kg)
  const countPerKg = latest.abw?Math.round(1000/latest.abw):0;
  const gradeData=[
    { name:'Jumbo (<30)', value: countPerKg<30?60:10 },
    { name:'Besar (30-50)', value: countPerKg>=30&&countPerKg<50?55:25 },

/* ============================================================
   KEWANGAN (Financial Management)
   ============================================================ */
function FinanceModule(){
  const { harvest } = useData();
  const totalIncome = FINANCE.reduce((s,f)=>s+f.income,0);
  const totalCost = FINANCE.reduce((s,f)=>s+f.cost,0);
  const profit = totalIncome-totalCost;
  const roi = ((profit/totalCost)*100).toFixed(1);
  const totalHarvestKg = harvest.reduce((s,h)=>s+(+h.kg||0),0);
  const costPerKg = totalHarvestKg?(totalCost/totalHarvestKg).toFixed(2):'—';
  const chart = FINANCE.map(f=>({month:f.month, Pendapatan:f.income, Kos:f.cost, Untung:f.profit}));

  const exportCSV = () => {
    const header='Bulan,Pendapatan,Benih,Feed,Elektrik,Buruh,Ubatan,Lain,Jumlah Kos,Untung/Rugi';
    const lines=FINANCE.map(f=>[f.month,f.income,f.seed,f.feed,f.elec,f.labor,f.med,f.other,f.cost,f.profit].join(','));
    const csv=[header,...lines,['JUMLAH',totalIncome,'','','','','','',totalCost,profit].join(',')].join('\n');
    const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);a.download='laporan_kewangan_2026.csv';a.click();
  };
  const cols=[
    { key:'month',label:'Bulan' },
    { key:'income',label:'Pendapatan',render:r=><span className="text-emerald-300">{fmtRM(r.income)}</span> },
    { key:'feed',label:'Feed',render:r=>fmtRM(r.feed) },
    { key:'seed',label:'Benih',render:r=>fmtRM(r.seed) },
    { key:'labor',label:'Buruh',render:r=>fmtRM(r.labor) },
    { key:'cost',label:'Jumlah Kos',render:r=><span className="text-rose-300">{fmtRM(r.cost)}</span> },
    { key:'profit',label:'Untung/Rugi',render:r=><b className={r.profit>=0?'text-emerald-300':'text-rose-300'}>{fmtRM(r.profit)}</b> },

  return (
    <div className="space-y-5">
      <SectionHeader icon="Wallet" title="Pengurusan Kewangan" desc="Kos operasi, pendapatan, untung/rugi & ROI"
        action={<button onClick={exportCSV} className={btnPrimary}><Icon name="Download" size={16}/>Export CSV</button>}/>
      <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
        <KpiCard icon="TrendingUp" label="Jumlah Pendapatan" value={fmtRM(totalIncome)} sub="6 bulan" tone="green"/>
        <KpiCard icon="TrendingDown" label="Jumlah Kos" value={fmtRM(totalCost)} tone="rose"/>
        <KpiCard icon="Wallet" label="Untung Bersih" value={fmtRM(profit)} tone={profit>=0?'green':'rose'}/>
        <KpiCard icon="Percent" label="ROI" value={roi+'%'} sub={'Kos/kg: RM '+costPerKg} tone="violet"/>
      </div>
      <div className="grid lg:grid-cols-3 gap-5">
        <Card className="lg:col-span-2">
          <h3 className="font-bold text-white mb-3">Pendapatan, Kos & Untung Bulanan</h3>
          <ResponsiveContainer width="100%" height={280}>
            <BarChart data={chart}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1c2740"/><XAxis dataKey="month" stroke="#64748b" fontSize={12}/><YAxis stroke="#64748b" fontSize={11} tickFormatter={v=>(v/1000)+'k'}/>
              <Tooltip contentStyle={{background:'#0d1424',border:'1px solid #1c2740',borderRadius:12}} formatter={v=>fmtRM(v)}/><Legend/>
              <Bar dataKey="Pendapatan" fill="#34d399" radius={[4,4,0,0]}/>

/* ============================================================
   PENGURUSAN PENGGUNA (Admin only)
   ============================================================ */
function UsersModule(){
  const { users, setUsers, user } = useAuth();
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const openNew=()=>{setForm({name:'',email:'',password:'',role:'Pekerja',active:true});setModal('new');};
  const openEdit=u=>{setForm({...u});setModal(u);};
  const save=()=>{
    if(!form.name||!form.email){alert('Sila isi nama & email');return;}
    if(modal==='new') setUsers(us=>[...us,{...form,id:Date.now(),lastLogin:null}]);
    else setUsers(us=>us.map(u=>u.id===modal.id?{...form}:u));
    setModal(null);
  };
  const del=u=>{if(u.id===user.id){alert('Tak boleh padam akaun sendiri');return;}if(confirm(`Padam ${u.name}?`))setUsers(us=>us.filter(x=>x.id!==u.id));};
  const cols=[
    { key:'name',label:'Nama',render:r=><div className="flex items-center gap-2"><Avatar name={r.name} size={28}/><span className="font-semibold text-white">{r.name}</span></div> },

    { key:'active',label:'Status',render:r=><StatusBadge status={r.active?'Normal':'Kosong'}/> },
    { key:'lastLogin',label:'Login Akhir',render:r=>r.lastLogin||'-' },
    { key:'_act',label:'',sortable:false,render:r=>(
      <div className="flex gap-1">
        <button onClick={()=>openEdit(r)} className="p-1.5 rounded-lg bg-panel2 hover:bg-cyan-500/20 text-cyan-300"><Icon name="Pencil" size={14}/></button>
        <button onClick={()=>del(r)} className="p-1.5 rounded-lg bg-panel2 hover:bg-rose-500/20 text-rose-300"><Icon name="Trash2" size={14}/></button>
      </div>) },
  ];
  const aCols=[{key:'time',label:'Masa'},{key:'user',label:'Pengguna'},{key:'action',label:'Aktiviti'}];
  return (

/* ============================================================
   LAPORAN & ANALITIK (Reports & Analytics)
   ============================================================ */
function ReportsModule(){
  const { ponds, feed, growth } = useData();
  const [period,setPeriod]=useState('Bulanan');
  // pond performance comparison
  const activePonds = ponds.filter(p=>p.status==='Aktif'||p.status==='Tuaian');
  const perf = activePonds.map(p=>{
    const feedKg=feed.filter(f=>f.pond===p.id).reduce((s,f)=>s+(+f.kg||0),0);
    const g=growth.filter(x=>x.pond===p.id).slice(-1)[0];
    const biomass=g?(g.abw/1000)*Math.round(p.seeded*p.survival/100):0;
    return { name:p.id.replace('KOLAM ','K'), Survival:p.survival, FCR:biomass?+(feedKg/biomass).toFixed(2):0, ABW:g?g.abw:0 };
  });
  const exportData = (fmt) => {
    const header='Kolam,Survival(%),FCR,ABW(g)';
    const lines=perf.map(p=>[p.name,p.Survival,p.FCR,p.ABW].join(','));
    const csv=[header,...lines].join('\n');
    if(fmt==='excel'){
      const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);a.download='laporan_prestasi_kolam.csv';a.click();
    } else { window.print(); }
  };
  const cols=[
    { key:'name',label:'Kolam' },
    { key:'Survival',label:'Survival %',render:r=><span className={r.Survival>=85?'text-emerald-300':'text-amber-300'}>{r.Survival}%</span> },
    { key:'FCR',label:'FCR',render:r=><span className={r.FCR<1.5?'text-emerald-300':'text-amber-300'}>{r.FCR}</span> },
    { key:'ABW',label:'ABW (g)' },
  ];
  return (
    <div className="space-y-5">
      <SectionHeader icon="FileBarChart" title="Laporan & Analitik" desc="Perbandingan prestasi & trend antara kolam"
        action={<div className="flex gap-2">
          <select className={inputCls+' !w-auto'} value={period} onChange={e=>setPeriod(e.target.value)}><option>Harian</option><option>Mingguan</option><option>Bulanan</option></select>
          <button onClick={()=>exportData('excel')} className={btnGhost}><Icon name="FileSpreadsheet" size={15}/>Excel</button>
          <button onClick={()=>exportData('pdf')} className={btnPrimary}><Icon name="FileText" size={15}/>PDF</button>
        </div>}/>
      <div className="grid lg:grid-cols-2 gap-5">
        <Card>
          <h3 className="font-bold text-white mb-3">Survival Rate vs FCR per Kolam</h3>
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={perf}>
              <CartesianGrid strokeDasharray="3 3" stroke="#1c2740"/><XAxis dataKey="name" stroke="#64748b" fontSize={12}/>
              <YAxis yAxisId="l" stroke="#34d399" fontSize={11}/><YAxis yAxisId="r" orientation="right" stroke="#fbbf24" fontSize={11}/>
              <Tooltip contentStyle={{background:'#0d1424',border:'1px solid #1c2740',borderRadius:12}}/><Legend/>
              <Bar yAxisId="l" dataKey="Survival" fill="#34d399" radius={[4,4,0,0]}/>
              <Bar yAxisId="r" dataKey="FCR" fill="#fbbf24" radius={[4,4,0,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
        <Card>
          <h3 className="font-bold text-white mb-3">Pertumbuhan ABW Semua Kolam</h3>
          <ResponsiveContainer width="100%" height={260}>
            <BarChart data={perf} layout="vertical">
              <CartesianGrid strokeDasharray="3 3" stroke="#1c2740"/><XAxis type="number" stroke="#64748b" fontSize={11}/><YAxis dataKey="name" type="category" stroke="#64748b" fontSize={12}/>
              <Tooltip contentStyle={{background:'#0d1424',border:'1px solid #1c2740',borderRadius:12}}/>
              <Bar dataKey="ABW" fill="#22d3ee" radius={[0,5,5,0]}/>
            </BarChart>
          </ResponsiveContainer>
        </Card>
      </div>
      <Card><h3 className="font-bold text-white mb-3">Jadual Prestasi Kolam ({period})</h3><DataTable columns={cols} rows={perf} searchable={false}/></Card>
      <div className="grid sm:grid-cols-3 gap-4">
        <Card><div className="text-center"><div className="text-3xl font-extrabold text-emerald-300">{Math.round(perf.reduce((s,p)=>s+p.Survival,0)/perf.length)}%</div><div className="text-xs text-slate-400 mt-1">Purata Survival</div></div></Card>
        <Card><div className="text-center"><div className="text-3xl font-extrabold text-cyan-300">{(perf.reduce((s,p)=>s+p.FCR,0)/perf.length).toFixed(2)}</div><div className="text-xs text-slate-400 mt-1">Purata FCR</div></div></Card>
        <Card><div className="text-center"><div className="text-3xl font-extrabold text-violet-300">{(perf.reduce((s,p)=>s+p.ABW,0)/perf.length).toFixed(1)}g</div><div className="text-xs text-slate-400 mt-1">Purata ABW</div></div></Card>
      </div>
    </div>
  );
}

/* ============================================================
   DATA STORE — Supabase + localStorage (offline fallback)
   ============================================================ */
const DataCtx = createContext(null);
const useData = () => useContext(DataCtx);
function withIds(arr){ return (arr||[]).map((r,i)=>({ _id: r._id ?? ('s'+i+'-'+Math.random().toString(36).slice(2,8)), ...r })); }

function DataProvider({ children }){
  const [syncSt, setSyncSt] = useState({ status:'syncing', msg:'Menyambung...' });
  const [loaded, setLoaded] = useState(false);

  const mk = (key, seed) => {
    const [v, setV] = useState(withIds(seed));
    const initRef = useRef(false);

    useEffect(() => {
      if(initRef.current) return;
      initRef.current = true;

      // Load dari localStorage dulu (cepat)
      try {
        const local = localStorage.getItem('upro_'+key);
        if(local) { const d=JSON.parse(local); if(d.length) setV(withIds(d)); }
      } catch(e){}

      // Sync dari Supabase
      if(supabase) {
        supabase.from('farm_data').select('data').eq('id', key).single()
          .then(({ data, error }) => {
            if(data && data.data && data.data.length) {
              setV(withIds(data.data));
              localStorage.setItem('upro_'+key, JSON.stringify(data.data));
            } else if(!localStorage.getItem('upro_'+key)) {
              localStorage.setItem('upro_'+key, JSON.stringify(withIds(seed)));
            }
            setSyncSt({ status:'synced', msg:'Tersimpan di cloud' });
          })
          .catch(() => setSyncSt(s => s.status==='syncing' ? { status:'offline', msg:'Offline — simpan lokal' } : s));
      } else {
        setSyncSt({ status:'offline', msg:'Supabase CDN tak ready' });
      }
    }, []);

    // Auto-save ke localStorage + Supabase (debounced)
    useEffect(() => {
      if(!initRef.current) return;
      localStorage.setItem('upro_'+key, JSON.stringify(v));
      if(!supabase) return;
      const timer = setTimeout(() => {
        setSyncSt({ status:'syncing', msg:'Menyimpan...' });
        supabase.from('farm_data').upsert({ id: key, data: v }, { onConflict: 'id' })
          .then(() => setSyncSt({ status:'synced', msg:'Tersimpan di cloud' }))
          .catch(() => setSyncSt({ status:'offline', msg:'Offline — simpan lokal' }));
      }, 800);
      return () => clearTimeout(timer);
    }, [v]);

    return [v, setV];
  };

  const [ponds,setPonds]       = mk('ponds', PONDS);
  const [water,setWater]       = mk('water', WATER_QUALITY);
  const [seed,setSeed]         = mk('seed', SEED_RECORDS);
  const [feed,setFeed]         = mk('feed', FEED_RECORDS);
  const [feedStock,setFeedStock]=mk('feedstock', FEED_STOCK);
  const [growth,setGrowth]     = mk('growth', GROWTH);
  const [health,setHealth]     = mk('health', HEALTH_RECORDS);
  const [medStock,setMedStock] = mk('medstock', MED_STOCK);
  const [harvest,setHarvest]   = mk('harvest', HARVESTS);

  const reset = () => {
    ['ponds','water','seed','feed','feedstock','growth','health','medstock','harvest']
      .forEach(k=>{ localStorage.removeItem('upro_'+k); supabase.from('farm_data').delete().eq('id',k).then() });
    location.reload();
  };

  return <SyncCtx.Provider value={syncSt}>
    <DataCtx.Provider value={{ ponds,setPonds, water,setWater, seed,setSeed, feed,setFeed, feedStock,setFeedStock, growth,setGrowth, health,setHealth, medStock,setMedStock, harvest,setHarvest, reset }}>
      {children}
    </DataCtx.Provider>
  </SyncCtx.Provider>;
}

/* ============================================================
   CrudPanel — table + Tambah/Edit/Padam + borang auto (schema)
   ============================================================ */
function CrudPanel({ title, icon, columns, fields, rows, setRows, canEdit=true, idKey='_id', searchable=true, pageSize=8 }){
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const openNew=()=>{ const init={}; fields.forEach(f=>init[f.key]=f.def!==undefined?f.def:(f.type==='number'?0:'')); setForm(init); setModal('new'); };
  const openEdit=r=>{ setForm({...r}); setModal(r); };
  const save=()=>{
    for(const f of fields){ if(f.required && (form[f.key]===''||form[f.key]==null)){ alert('Sila isi '+f.label); return; } }
    if(modal==='new'){ const nr={...form,[idKey]:('n'+Date.now()+'-'+Math.random().toString(36).slice(2,6))}; setRows(rs=>[nr,...rs]); }
    else setRows(rs=>rs.map(r=>r[idKey]===modal[idKey]?{...r,...form}:r));
    setModal(null);
  };
  const del=r=>{ if(confirm('Padam rekod ni?')) setRows(rs=>rs.filter(x=>x[idKey]!==r[idKey])); };
  const allCols = canEdit ? [...columns,{key:'_act',label:'',sortable:false,render:r=>(
    <div className="flex gap-1">
      <button onClick={()=>openEdit(r)} className="p-1.5 rounded-lg bg-panel2 hover:bg-cyan-500/20 text-cyan-300"><Icon name="Pencil" size={14}/></button>
      <button onClick={()=>del(r)} className="p-1.5 rounded-lg bg-panel2 hover:bg-rose-500/20 text-rose-300"><Icon name="Trash2" size={14}/></button>
    </div>)}] : columns;
  return (<>
    <Card>
      <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
        <h3 className="font-bold text-white flex items-center gap-2">{icon&&<Icon name={icon} size={16} className="text-cyan-300"/>}{title}</h3>
        {canEdit && <button onClick={openNew} className={btnPrimary}><Icon name="Plus" size={15}/>Tambah Rekod</button>}
      </div>
      <DataTable columns={allCols} rows={rows} searchable={searchable} pageSize={pageSize}/>
    </Card>
    <Modal open={!!modal} onClose={()=>setModal(null)} title={modal==='new'?'Tambah Rekod Baru':'Edit Rekod'} wide>
      <div className="grid sm:grid-cols-2 gap-4">
        {fields.map(f=>(<Field key={f.key} label={f.label}>
          {f.type==='select'
            ? <select className={inputCls} value={form[f.key]??''} onChange={e=>set(f.key,e.target.value)}>{f.options.map(o=><option key={o} value={o}>{o}</option>)}</select>
            : <input type={f.type||'text'} step="any" className={inputCls} value={form[f.key]??''} onChange={e=>set(f.key, f.type==='number'?(+e.target.value):e.target.value)}/>}
        </Field>))}
      </div>
      <div className="flex justify-end gap-2 mt-5">
        <button onClick={()=>setModal(null)} className={btnGhost}>Batal</button>
        <button onClick={save} className={btnPrimary}><Icon name="Save" size={16}/>Simpan</button>
      </div>
    </Modal>
  </>);
}

<script>
/* Manual Babel transform (in case auto-detect fails) */
(function(){
  try {
    var s = document.querySelector('script[type="text/babel"]');
    if(s && !window.__babelDone) {
      window.__babelDone = true;
      var code = s.textContent;
      var result = Babel.transform(code, { presets: s.getAttribute('data-presets') ? [s.getAttribute('data-presets')] : [] });
      var newScript = document.createElement('script');
      newScript.textContent = result.code;
      document.body.appendChild(newScript);
    }
  } catch(e) { console.error('Babel manual transform error:', e); }
})();
</script>
