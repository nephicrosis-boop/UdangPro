/* Growth sampling — 8 minggu */
function genGrowth(pondId, startW, adg) {
  const arr = [];
  let w = startW;
  for (let wk = 1; wk <= 8; wk++) {
    w = +(w + adg * 7 * (0.9 + Math.random() * 0.2)).toFixed(2);
    arr.push({
      id: `${pondId}-w${wk}`,
      week: wk,
      date: daysAgo((8 - wk) * 7),
      pond: pondId,
      abw: w,
      length: +(Math.pow(w, 0.32) * 5.2).toFixed(1),
      target: +(startW + adg * 7 * wk).toFixed(2),
      adg: +adg.toFixed(3)
    });
  }
  return arr;
}
