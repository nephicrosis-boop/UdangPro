      salinity: +(18 + wobble * 1.5 + (Math.random() - 0.5)).toFixed(1),
      transparency: +(35 + wobble * 4 + (Math.random() - 0.5) * 5).toFixed(0),

      alkalinity: +(120 + wobble * 8 + (Math.random() - 0.5) * 10).toFixed(0)
    });
  }
  return arr;
}

function genGrowth(pondId, startW, adg) {
  const arr = [];
  let w = startW;
  for (let wk = 1; wk <= 8; wk++) {
    w = +(w + adg * 7 * (0.9 + Math.random() * 0.2)).toFixed(2);
    arr.push({
      id: `${pondId}-w${wk}`,
      week: wk,
      date: daysAgo((8 - wk) * 7),
      pond: pondId,
      abw: w,
      length: +(Math.pow(w, 0.32) * 5.2).toFixed(1),
      target: +(startW + adg * 7 * wk).toFixed(2),
      adg: +adg.toFixed(3)
    });
  }
  return arr;
}

function AuthProvider({

}) {

      return s ? JSON.parse(s) : SEED_USERS;
    } catch (e) {
      return SEED_USERS;
    }
  });
  const [user, setUser] = useState(() => {
    try {
      const s = localStorage.getItem('upro_session');
      return s ? JSON.parse(s) : null;
    } catch (e) {
      return null;
    }
  });
  useEffect(() => {
    localStorage.setItem('upro_users', JSON.stringify(users));
  }, [users]);
  const login = (email, password, remember) => {
    const u = users.find(x => x.email.toLowerCase() === email.toLowerCase().trim() && x.password === password);
    if (!u) return {
      ok: false,
      msg: 'Email atau kata laluan salah.'
    };
    if (!u.active) return {
      ok: false,
      msg: 'Akaun tidak aktif. Hubungi admin.'
    };
    const sess = {
      id: u.id,
      name: u.name,
      email: u.email,
      role: u.role
    };
    setUser(sess);
    if (remember) localStorage.setItem('upro_session', JSON.stringify(sess));else sessionStorage.setItem('upro_session', JSON.stringify(sess));
    setUsers(us => us.map(x => x.id === u.id ? {
      ...x,
      lastLogin: todayISO
    } : x));
    return {
      ok: true
    };
  };
  const register = data => {
    if (users.some(x => x.email.toLowerCase() === data.email.toLowerCase().trim())) return {
      ok: false,
      msg: 'Email sudah didaftarkan.'
    };
    const nu = {
      id: Date.now(),
      ...data,
      active: true,
      lastLogin: null
    };
    setUsers(us => [...us, nu]);
    return {
      ok: true
    };
  };
  const logout = () => {
