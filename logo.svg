<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- ANTENNAE (back layer) -->
  <!-- Left thick antenna - large C sweep up-left -->
  <path d="M40 68 Q20 55 22 30 Q24 18 35 12" stroke="#2DD4D8" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Right thin antennae - sweeping up-right -->
  <path d="M52 40 Q60 25 78 18" stroke="#2DD4D8" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M54 44 Q64 32 82 30" stroke="#2DD4D8" stroke-width="1.3" fill="none" stroke-linecap="round"/>

  <!-- TAIL (bottom layer) -->
  <!-- Left uropod - dark navy pointing left -->
  <path d="M45 76 Q38 78 32 74 Q38 72 42 73 Z" fill="#0B1F44"/>
  <!-- Center telson - teal pointing down-left -->
  <path d="M42 73 Q40 80 36 86 Q42 84 46 80 Z" fill="#2DD4D8"/>
  <!-- Right uropod - dark navy pointing right -->
  <path d="M46 80 Q52 78 58 80 Q54 84 48 82 Z" fill="#0B1F44"/>

  <!-- LEGS -->
  <path d="M38 62 Q32 64 28 60" stroke="#2DD4D8" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M40 70 Q34 72 30 68" stroke="#2DD4D8" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- BODY -->
  <!-- Main body - large teal shape -->
  <path d="M35 42 Q30 48 32 56 Q34 64 38 70 Q42 74 46 76 Q52 74 54 68 Q56 60 54 52 Q52 44 48 42 Z" fill="#2DD4D8"/>
  <!-- Shadow segment - darker teal stripe -->
  <path d="M38 62 Q42 64 48 62 Q50 66 48 70 Q44 72 40 70 Q36 68 36 64 Z" fill="#1AA5A8"/>

  <!-- HEAD / EYE (top layer) -->
  <!-- Dark navy eye block -->
  <path d="M34 38 Q28 38 26 34 Q24 28 28 22 Q32 18 38 20 Q44 22 46 28 Q48 34 46 42 Q42 44 38 42 Z" fill="#0B1F44"/>
  <!-- White crescent eye highlight -->
  <path d="M30 30 Q28 28 30 25 Q32 28 32 30 Z" fill="white"/>
  <!-- Teal cap on head -->
  <path d="M28 22 Q32 16 40 18 Q44 20 46 26 Q42 20 36 20 Q30 20 28 22 Z" fill="#2DD4D8"/>
</svg>
