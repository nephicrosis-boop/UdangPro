<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Monochrome shrimp - single color, negative space design -->
  
  <!-- Main body curve -->
  <path d="M42 18 C28 18 18 28 18 42 C18 56 28 66 42 66 C50 66 56 62 62 56 C68 50 76 48 84 48" 
        stroke="#1E293B" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Head curve -->
  <path d="M42 18 C32 18 22 24 20 34 C18 42 22 50 28 54 C34 58 40 56 44 52" 
        fill="none" stroke="#1E293B" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Eye -->
  <circle cx="30" cy="34" r="4" fill="#1E293B"/>
  <circle cx="30" cy="34" r="1.5" fill="white"/>
  
  <!-- Rostrum -->
  <path d="M28 24 L18 12" stroke="#1E293B" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Antennae -->
  <path d="M34 22 C38 16 44 12 52 10 C60 8 68 10 72 16" 
        stroke="#1E293B" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M36 26 C42 20 50 16 60 18 C68 20 74 26 78 34" 
        stroke="#1E293B" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  
  <!-- Tail -->
  <path d="M62 56 C60 62 56 68 50 72 C56 70 62 66 66 60" 
        fill="#1E293B" stroke-linecap="round"/>
  <path d="M50 72 C46 78 40 82 34 84 C40 80 46 76 50 72" 
        fill="#1E293B" stroke-linecap="round"/>
  <path d="M66 60 C72 58 78 58 82 60 C76 62 70 62 66 60" 
        fill="#1E293B"/>
  
  <!-- Legs -->
  <line x1="38" y1="50" x2="30" y2="50" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="40" y1="54" x2="32" y2="54" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="42" y1="58" x2="34" y2="58" stroke="#1E293B" stroke-width="1.5" stroke-linecap="round"/>
</svg>
