<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2DD4D8"/>
      <stop offset="100%" style="stop-color:#0B1F44"/>
    </linearGradient>
  </defs>

  <!-- Back antenna - sweeping curve up-right -->
  <path d="M36 24 C42 16 52 10 64 8 C74 6 82 10 86 18" 
        stroke="#0B1F44" stroke-width="1.6" fill="none" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Front antenna -->
  <path d="M38 28 C46 20 56 16 68 18 C78 20 84 28 88 36" 
        stroke="#0B1F44" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- Rostrum -->
  <path d="M32 22 L20 8" stroke="#2DD4D8" stroke-width="2.2" stroke-linecap="round"/>

  <!-- Carapace / head shield -->
  <path d="M44 16 C30 16 20 24 20 36 C20 44 24 50 30 54 C36 58 42 56 46 50 L46 16 Z" 
        fill="#0B1F44" stroke="none"/>
  
  <!-- Eye - negative space -->
  <circle cx="30" cy="34" r="4.5" fill="white"/>
  <circle cx="30" cy="34" r="3" fill="#0B1F44"/>
  <circle cx="29" cy="33" r="1" fill="white" opacity="0.8"/>
  
  <!-- Body curve - sweeping elegant arc -->
  <path d="M44 16 C44 24 42 34 40 42 C38 52 40 58 44 64 
           C48 70 54 72 60 68 C66 64 72 58 80 54 
           C86 50 90 48 92 48" 
        stroke="#2DD4D8" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  
  <!-- Body segments - elegant arcs -->
  <path d="M42 38 C46 38 50 40 52 44" stroke="white" stroke-width="0.8" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M40 48 C44 48 50 50 54 54" stroke="white" stroke-width="0.8" fill="none" opacity="0.4" stroke-linecap="round"/>
  <path d="M42 58 C46 58 52 56 56 52" stroke="#0B1F44" stroke-width="0.8" fill="none" opacity="0.3" stroke-linecap="round"/>
  
  <!-- Tail fan - three fins -->
  <path d="M60 68 C58 72 54 78 48 82 C52 78 58 74 62 70 Z" 
        fill="#2DD4D8"/>
  <path d="M48 82 C42 86 36 88 30 88 C36 84 42 82 48 82 Z" 
        fill="#2DD4D8" opacity="0.8"/>
  <path d="M62 70 C66 74 70 76 76 76 C70 74 66 70 64 68 Z" 
        fill="#0B1F44"/>

  <!-- Legs -->
  <path d="M38 50 L28 49" stroke="#0B1F44" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M38 56 L28 55" stroke="#0B1F44" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <path d="M40 62 L30 61" stroke="#0B1F44" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
</svg>
